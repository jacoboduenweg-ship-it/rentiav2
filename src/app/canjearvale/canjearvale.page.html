

<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Canjear Vale</ion-title>
    <ion-buttons slot="start">
      <ion-menu-button menu="main-content"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Canjear Vale</ion-title>
    </ion-toolbar>
  </ion-header>

  <div>
    <ion-item>
      <ion-input label="Folio" value="{{folio}}" disabled></ion-input>
    </ion-item>

    <ion-item>
      <ion-select placeholder="Montos"  [(ngModel)]="montoSelect" (ionChange)="seleccionarMonto($event)">
        <ion-select-option  *ngFor="let monto of datosMontos" value="{{monto.monto}}">{{monto.monto}}</ion-select-option>
       
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-select placeholder="Plazos" [(ngModel)]="plazoSelect">
        <ion-select-option  *ngFor="let plazo of datosplazos"  value="{{plazo.periodo}}">{{plazo.periodo}}</ion-select-option>
       
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-input style="text-transform: uppercase;" label="Nombre del cliente" [(ngModel)]="nombre"></ion-input>
    </ion-item>

    <ion-button (click)="verificarvaledist()" expand="block">Dar vale</ion-button>

    <ion-item>
      <ion-toggle [(ngModel)]="cancelarCheck" (ionChange)="mostrarCancelar()">Cancelar Vale</ion-toggle>
    </ion-item>

    <div *ngIf="mostrarCancelarVar">

    <ion-item>
  
        <ion-input type="number" label="Folio a cancelar" [(ngModel)]="folioCancelar"></ion-input>
      

   
    </ion-item>
    <ion-item>
      <ion-label>
        <b> *LOS VALES SOLO SE PUEDEN DAR DE BAJA SI NO SE HAN CANJEADO EN ALGUNA SUCURSAL. </b>
       </ion-label>
    </ion-item>
    <ion-button (click)="cancelarvale()" expand="block" color="danger">Cancelar vale</ion-button>
    </div>

  </div>

  
</ion-content>
