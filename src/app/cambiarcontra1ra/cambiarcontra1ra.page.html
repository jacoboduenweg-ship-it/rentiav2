<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>cambiarcontra1ra</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Cambiar contraseña</ion-title>
    </ion-toolbar>
  </ion-header>
<form [formGroup]="contrasenas">
  <div  id="container">
    <ion-card>
      <ion-card-header>
        <ion-card-title>Es obligatorio cambiar la contraseña al inciar sesion por primera vez</ion-card-title>
      
      </ion-card-header>

    </ion-card>
    <ion-item>
      <ion-input label="Contraseña Actual" formControlName="actual" ></ion-input>
    </ion-item>
    <ion-item>
      <ion-input label="Contraseña Nueva" formControlName="nueva"></ion-input>
    </ion-item>

    <ion-button (click)="cambiarcontra()" expand="block" color="danger">Cambiar contraseña</ion-button>
   
   
  </div>
</form>
</ion-content>
